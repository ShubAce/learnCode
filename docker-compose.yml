version: "3.8"

services:
    postgres:
        image: postgres:17
        container_name: learncode_build
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres123
            POSTGRES_DB: learnCode
        ports:
            - "5432:5432"
        volumes:
            - learnCode_db_data:/var/lib/postgresql/data
        restart: unless-stopped

volumes:
    learnCode_db_data:
